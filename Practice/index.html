<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon-48.png" sizes="48x48" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Practice Science Bowl questions online for free. Choose middle school or high school level, pick your subjects — biology, physics, chemistry, earth &amp; space, energy, math — and quiz yourself in standard or survival mode." />
    <meta name="keywords" content="science bowl practice questions, science bowl quiz, science bowl test, science bowl tossup, MSBE questions, HSBE questions, science bowl multiple choice, science bowl biology, science bowl physics, science bowl chemistry, science bowl math" />
    <link rel="canonical" href="https://sciencebowlpractice.org/Practice/" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sciencebowlpractice.org/Practice/" />
    <meta property="og:site_name" content="Science Bowl Command Network" />
    <meta property="og:title" content="Science Bowl Practice Quiz — Free Online Questions" />
    <meta property="og:description" content="Practice Science Bowl questions online for free. Choose middle school or high school, pick your subjects, and quiz yourself with tossup and bonus style questions." />
    <meta property="og:image" content="https://sciencebowlpractice.org/og-image.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://sciencebowlpractice.org/og-image.jpg" />
    <meta name="twitter:title" content="Science Bowl Practice Quiz — Free Online Questions" />
    <meta name="twitter:description" content="Practice Science Bowl questions online for free. Choose middle school or high school, pick your subjects, and quiz yourself with tossup and bonus style questions." />
    <title>Science Bowl Practice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="/style.css" />
    <script src="/settings.js"></script>
  <script type="application/ld+json">
  [
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Science Bowl Practice Quiz",
      "url": "https://sciencebowlpractice.org/Practice/",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Web Browser",
      "description": "Practice Science Bowl questions online for free. Choose middle school or high school, pick your subjects, and quiz yourself.",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "breadcrumb": {
        "@type": "BreadcrumbList",
        "itemListElement": [
          { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://sciencebowlpractice.org/" },
          { "@type": "ListItem", "position": 2, "name": "Practice Quiz", "item": "https://sciencebowlpractice.org/Practice/" }
        ]
      }
    },
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What subjects can I practice?",
          "acceptedAnswer": { "@type": "Answer", "text": "Biology, Chemistry, Physics, Earth & Space Science, Energy, and Math — for both middle school and high school levels." }
        },
        {
          "@type": "Question",
          "name": "What practice modes are available?",
          "acceptedAnswer": { "@type": "Answer", "text": "Standard mode lets you quiz through questions at your own pace. Survival mode ends your session on a wrong answer for added pressure." }
        },
        {
          "@type": "Question",
          "name": "Are the questions formatted like real Science Bowl questions?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. Questions follow the tossup and bonus format used in official NSB (National Science Bowl) competitions." }
        },
        {
          "@type": "Question",
          "name": "Does the site track my practice progress?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. After each session your accuracy by subject is saved locally, and you can review it in the Progress Report." }
        }
      ]
    }
  ]
  </script>
  </head>
  <body>
    <canvas id="starfield"></canvas>
    <div id="scanlines"></div>

    <div id="home-link-wrap" style="text-align:center;margin-top:1.5rem">
      <a href="/" class="debrief-btn debrief-btn-secondary" style="font-size:0.72rem;letter-spacing:0.22em;text-decoration:none;display:inline-block">← HOME BASE</a>
    </div>

    <h1 id="Title">COMMAND DECK<span class="blink-cursor">|</span></h1>

    <div id="ranks" class="hud-panel">
      <div class="panel-label">OPERATIVE CLASS</div>
      <button id="Cadet" onclick="MSSelect()">AGENT <span class="rank-sub">[ MIDDLE SCHOOL ]</span></button>
      <button id="Lieutenant" onclick="HSSelect()">COMMANDER <span class="rank-sub">[ HIGH SCHOOL ]</span></button>
    </div>

    <div id="CampaignLength" class="hud-panel">
      <div class="panel-label">OPERATION SCALE</div>
      <div style="display:flex;gap:0.5rem;margin-bottom:0.75rem">
        <button id="standard-btn" class="diff-btn" onclick="setSurvivalMode(false)">STANDARD</button>
        <button id="survival-btn" class="diff-btn" onclick="setSurvivalMode(true)">SURVIVAL <span class="rank-sub">[ 3 lives ]</span></button>
      </div>
      <h3 id="AmountQuestions">30 QUESTIONS</h3>
      <input type="range" min="10" max="100" value="30" id="QuestionSlider" oninput="UpdateQuestions()" />
      <p id="survival-label" style="display:none;font-size:0.72rem;letter-spacing:0.15em;color:var(--magenta);text-shadow:0 0 8px var(--magenta);margin:0">3 LIVES — WRONG ANSWERS COST A LIFE</p>
    </div>

    <div id="SubjectContainer" class="hud-panel">
      <div class="panel-label">MODULE SELECT</div>
      <label><input id="Everything" type="checkbox" onclick="addSubject('Everything', this)" /> ALL MODULES</label>
      <label><input id="Biology"    type="checkbox" onclick="addSubject('Biology', this)"    /> BIOLOGY</label>
      <label><input id="Physics"    type="checkbox" onclick="addSubject('Physics', this)"    /> PHYSICS</label>
      <label><input id="Chemistry"  type="checkbox" onclick="addSubject('Chemistry', this)"  /> CHEMISTRY</label>
      <label><input id="EarthSpace" type="checkbox" onclick="addSubject('EarthSpace', this)" /> EARTH &amp; SPACE</label>
      <label><input id="Energy"     type="checkbox" onclick="addSubject('Energy', this)"     /> ENERGY</label>
      <label><input id="Math"       type="checkbox" onclick="addSubject('Math', this)"       /> MATHEMATICS</label>
    </div>

    <div id="OptionsPanel" class="hud-panel">
      <div class="panel-label">MISSION OPTIONS</div>
      <label><input id="TimedMode" type="checkbox" /> TIMED MODE</label>
      <label><input id="AudioMode" type="checkbox" /> AUDIO READOUT</label>
      <label><input id="HideAnswers" type="checkbox" /> HIDE ANSWERS IN DEBRIEF</label>
      <div class="option-divider"></div>
      <span class="option-group-label">QUESTION TYPE</span>
      <label><input type="radio" name="qtype" value="mixed" checked /> MIXED</label>
      <label><input type="radio" name="qtype" value="mc" /> MULTIPLE CHOICE ONLY</label>
      <label><input type="radio" name="qtype" value="oe" /> OPEN ENDED ONLY</label>
    </div>

    <div id="status-indicator"></div>
    <div id="review-launch"></div>

    <div id="question-counter" style="display:none"></div>
    <div id="lives-display" style="display:none"></div>
    <div id="streak-display" style="display:none"></div>
    <div id="key-hint" style="display:none" class="key-hint">W / X / Y / Z to select &nbsp;·&nbsp; ENTER to submit</div>
    <div id="QuestionContainer"></div>
    <h1 id="answer"></h1>
    <button onclick="AddMCQuestion()" id="Submit">&#9889; LAUNCH SEQUENCE</button>
    <button onclick="showResults()" id="EndEarly" style="display:none">&#9632; END OPERATION EARLY</button>
    <button onclick="location.href='index.html'" id="AbandonBtn" style="display:none">✕ ABANDON</button>

    <script src="/question.js"></script>
    <script src="/Practice.js"></script>
    <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js',{scope:'/'});</script>
  </body>
</html>
