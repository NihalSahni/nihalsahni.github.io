<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="favicon-48.png" sizes="48x48" type="image/png" />
    <meta name="robots" content="noindex, follow" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Track your Science Bowl practice performance over time. See your accuracy by subject, monitor improvement, and identify weak areas to focus on before your next Science Bowl competition." />
    <meta name="keywords" content="science bowl progress tracker, science bowl score tracker, science bowl performance stats, science bowl practice results, NSB prep tracker" />
    <link rel="canonical" href="https://sciencebowlpractice.org/Progress.html" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sciencebowlpractice.org/Progress.html" />
    <meta property="og:site_name" content="Science Bowl Command Network" />
    <meta property="og:title" content="Science Bowl Progress Tracker — Science Bowl Command Network" />
    <meta property="og:description" content="Track your Science Bowl practice performance over time. Monitor your scores by subject and improve before your next competition." />
    <meta name="twitter:card" content="summary" />

    <meta name="twitter:description" content="Track your Science Bowl practice performance over time. Monitor your scores by subject and improve before your next competition." />
    <title>Progress — Science Bowl Command Network</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css" />
    <script src="settings.js"></script>
    <style>
      .page-wrap { max-width: 860px; margin: 0 auto; }
      .page-header { padding: 2rem 0 1rem; text-align: center; }
      .back-link { display: inline-block; font-size: 0.78rem; letter-spacing: 0.22em; color: var(--green); text-shadow: 0 0 6px var(--green)99; text-decoration: none; margin-bottom: 1rem; border: 1px solid var(--green)55; padding: 0.3rem 0.8rem; border-radius: 2px; transition: all 0.2s; }
      .back-link:hover { color: var(--green); text-shadow: 0 0 12px var(--green); border-color: var(--green); background: var(--green)11; }
      .page-title { font-size: clamp(1.8rem, 5vw, 3rem); color: var(--green); text-shadow: 0 0 30px var(--green), 0 0 60px var(--green)44; margin: 0.25rem 0; }
      .page-sub { font-size: 0.68rem; letter-spacing: 0.3em; color: var(--muted); margin-top: 0.4rem; }

      /* ── Weak spot ── */
      .weak-spot { max-width: 560px; margin: 1.8rem auto 0; background: var(--surface); border: 1px solid var(--magenta)55; border-radius: 4px; padding: 1.2rem 1.4rem; position: relative; }
      .weak-spot::before { content: ''; position: absolute; top: -2px; left: -2px; width: 14px; height: 14px; border-top: 2px solid var(--magenta); border-left: 2px solid var(--magenta); }
      .weak-spot::after  { content: ''; position: absolute; bottom: -2px; right: -2px; width: 14px; height: 14px; border-bottom: 2px solid var(--magenta); border-right: 2px solid var(--magenta); }
      .ws-label { font-size: 0.6rem; letter-spacing: 0.3em; color: var(--magenta); text-shadow: 0 0 6px var(--magenta); margin-bottom: 0.4rem; }
      .ws-subject { font-size: 1.3rem; letter-spacing: 0.1em; margin: 0.25rem 0; }
      .ws-stats { font-size: 0.68rem; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 0.9rem; }
      .ws-drill-btn { display: inline-block; font-size: 0.72rem; letter-spacing: 0.2em; color: var(--magenta); border: 1px solid var(--magenta)77; padding: 0.35rem 0.9rem; border-radius: 2px; text-decoration: none; transition: all 0.2s; }
      .ws-drill-btn:hover { background: var(--magenta)11; border-color: var(--magenta); text-shadow: 0 0 8px var(--magenta); }

      /* ── Overall totals ── */
      .totals-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; max-width: 560px; margin: 2.5rem auto 2rem; }
      .total-card { background: var(--surface); border: 1px solid var(--muted)44; border-radius: 4px; padding: 1.4rem 1.2rem; text-align: center; position: relative; }
      .total-card::before { content: ''; position: absolute; top: -2px; left: -2px; width: 14px; height: 14px; border-top: 2px solid var(--c, var(--green)); border-left: 2px solid var(--c, var(--green)); }
      .total-card::after  { content: ''; position: absolute; bottom: -2px; right: -2px; width: 14px; height: 14px; border-bottom: 2px solid var(--c, var(--green)); border-right: 2px solid var(--c, var(--green)); }
      .total-label { font-size: 0.6rem; letter-spacing: 0.28em; color: var(--muted); margin-bottom: 0.5rem; }
      .total-num { font-size: 2rem; color: var(--c, var(--green)); text-shadow: 0 0 14px var(--c, var(--green)); }
      .total-denom { font-size: 0.85rem; color: var(--muted); }
      .total-pct { font-size: 0.68rem; letter-spacing: 0.15em; color: var(--c, var(--green)); margin-top: 0.25rem; opacity: 0.75; }

      /* ── Level sections ── */
      .level-section { margin-bottom: 3rem; }
      .level-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; border-bottom: 1px solid var(--muted)33; padding-bottom: 0.75rem; margin-bottom: 1.4rem; }
      .level-title { font-size: 1.2rem; letter-spacing: 0.15em; color: var(--c, var(--magenta)); text-shadow: 0 0 12px var(--c, var(--magenta)); margin: 0; }
      .level-total { font-size: 0.68rem; letter-spacing: 0.18em; color: var(--muted); }

      /* ── Subject bars ── */
      .subject-list { display: flex; flex-direction: column; gap: 0.9rem; }
      .subject-row { background: var(--surface); border: 1px solid var(--muted)33; border-radius: 4px; padding: 0.9rem 1.1rem; }
      .subject-row-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.55rem; }
      .subject-name { font-size: 0.72rem; letter-spacing: 0.18em; }
      .subject-count { font-size: 0.68rem; letter-spacing: 0.12em; color: var(--muted); }
      .bar-track { height: 4px; background: var(--muted)22; border-radius: 2px; overflow: hidden; }
      .bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }

      /* ── Practice stats ── */
      .practice-section { margin-bottom: 3rem; }
      .practice-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; border-bottom: 1px solid var(--muted)33; padding-bottom: 0.75rem; margin-bottom: 1.4rem; }
      .practice-title { font-size: 1.2rem; letter-spacing: 0.15em; color: var(--orange, #f5a623); text-shadow: 0 0 12px var(--orange, #f5a623); margin: 0; }
      .practice-meta { font-size: 0.68rem; letter-spacing: 0.18em; color: var(--muted); }
      .practice-totals { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; max-width: 560px; margin: 0 auto 1.8rem; }
      .practice-list { display: flex; flex-direction: column; gap: 0.9rem; margin-bottom: 1.8rem; }

      /* ── Session history ── */
      .history-section { max-width: 860px; margin: 0 auto 3rem; }
      .history-header { border-bottom: 1px solid var(--muted)33; padding-bottom: 0.75rem; margin-bottom: 1.4rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:0.5rem; }
      .history-title { font-size: 1.2rem; letter-spacing: 0.15em; color: var(--cyan); text-shadow: 0 0 12px var(--cyan); margin: 0; }
      .history-bars { display: flex; align-items: flex-end; gap: 0.6rem; height: 100px; }
      .h-bar-col { display: flex; flex-direction: column; align-items: center; gap: 0.3rem; flex: 1; }
      .h-bar-track { width: 100%; background: var(--muted)22; border-radius: 2px; flex: 1; display:flex; align-items:flex-end; }
      .h-bar-fill { width: 100%; border-radius: 2px; transition: height 0.5s ease; }
      .h-bar-pct { font-size: 0.62rem; letter-spacing: 0.08em; }
      .h-bar-date { font-size: 0.58rem; color: var(--muted); letter-spacing: 0.05em; white-space:nowrap; }
      .h-bar-badge { font-size: 0.5rem; letter-spacing: 0.08em; padding: 0.1rem 0.3rem; border-radius: 2px; margin-bottom:0.15rem; }

      /* ── Buzzer stats ── */
      .buzzer-section { max-width: 860px; margin: 0 auto 3rem; }
      .buzzer-header { border-bottom: 1px solid var(--muted)33; padding-bottom: 0.75rem; margin-bottom: 1.4rem; }
      .buzzer-title { font-size: 1.2rem; letter-spacing: 0.15em; color: var(--magenta); text-shadow: 0 0 12px var(--magenta); margin: 0; }
      .buzzer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 0.9rem; margin-bottom: 1.4rem; }
      .bz-card { background: var(--surface); border: 1px solid var(--muted)33; border-radius: 4px; padding: 0.9rem; text-align: center; }
      .bz-card-num { font-size: 1.6rem; }
      .bz-card-label { font-size: 0.58rem; letter-spacing: 0.18em; color: var(--muted); margin-top: 0.2rem; }
      .bz-history { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.5rem; }
      .bz-pip { width: 14px; height: 14px; border-radius: 2px; }

      /* ── Review queue ── */
      .rq-section { margin: 0 auto 3rem; max-width: 860px; }
      .rq-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; border-bottom: 1px solid var(--muted)33; padding-bottom: 0.75rem; margin-bottom: 1.4rem; }
      .rq-title { font-size: 1.2rem; letter-spacing: 0.15em; color: var(--cyan); text-shadow: 0 0 12px var(--cyan); margin: 0; }
      .rq-count { font-size: 0.68rem; letter-spacing: 0.18em; color: var(--muted); }
      .rq-list { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1.2rem; }
      .rq-item { display: flex; align-items: center; gap: 0.75rem; background: var(--surface); border: 1px solid var(--muted)33; border-radius: 4px; padding: 0.75rem 1rem; }
      .rq-subject { font-size: 0.6rem; letter-spacing: 0.22em; padding: 0.2rem 0.5rem; border-radius: 2px; white-space: nowrap; }
      .rq-question { flex: 1; font-size: 0.72rem; letter-spacing: 0.06em; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .rq-remove { background: transparent; border: 1px solid var(--muted)44; color: var(--muted); font-size: 0.6rem; padding: 0.15rem 0.45rem; border-radius: 2px; cursor: pointer; font-family: 'Share Tech Mono', monospace; transition: all 0.2s; }
      .rq-remove:hover { border-color: var(--red, #ff4444); color: var(--red, #ff4444); background: transparent; box-shadow: none; }
      .rq-drill-btn { display: inline-block; font-size: 0.72rem; letter-spacing: 0.2em; color: var(--cyan); border: 1px solid var(--cyan)77; padding: 0.35rem 0.9rem; border-radius: 2px; text-decoration: none; transition: all 0.2s; }
      .rq-drill-btn:hover { background: var(--cyan)11; border-color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }
      .rq-empty { font-size: 0.72rem; letter-spacing: 0.15em; color: var(--muted); text-align: center; padding: 1.5rem 0; }

      /* ── Reset button ── */
      .reset-row { text-align: center; margin: 1rem 0 3rem; display: flex; gap: 0.8rem; justify-content: center; flex-wrap: wrap; }
      .reset-btn { background: transparent; border: 1px solid var(--muted)55; color: var(--muted); font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; letter-spacing: 0.18em; padding: 0.4rem 1.1rem; cursor: pointer; border-radius: 2px; transition: all 0.2s; }
      .reset-btn:hover { border-color: var(--red, #ff4444); color: var(--red, #ff4444); }

      footer { text-align: center; font-size: 0.62rem; letter-spacing: 0.15em; color: var(--muted)88; padding: 2rem 0; }

      @media (max-width: 600px) {
        .totals-row { grid-template-columns: 1fr; }
        .practice-totals { grid-template-columns: 1fr; }
        .reset-row { flex-direction: column; align-items: center; }
        .reset-btn { width: 100%; max-width: 320px; text-align: center; }
        .buzzer-grid { grid-template-columns: repeat(3, 1fr); }
        .rq-question { white-space: normal; }
        .rq-item { flex-wrap: wrap; }
        .history-bars { gap: 0.3rem; overflow-x: auto; padding-bottom: 0.5rem; }
        .h-bar-date { font-size: 0.5rem; }
        .page-header { padding: 1.5rem 0 0.75rem; }
        .back-link { font-size: 0.68rem; }
        .level-header { flex-direction: column; align-items: flex-start; gap: 0.25rem; }
      }
    </style>
  </head>
  <body>
    <canvas id="starfield"></canvas>
    <div id="scanlines"></div>

    <div class="page-wrap">
      <div class="page-header">
        <a href="index.html" class="back-link">← HOME BASE</a>
        <h1 class="page-title">PROGRESS REPORT</h1>
        <p class="page-sub">MODULE 04 — FLASHCARD &amp; PRACTICE TRACKING</p>
      </div>

      <div id="weak-spot" class="weak-spot" style="display:none"></div>
      <div id="streak-card" class="total-card" style="display:none;max-width:560px;margin:1.2rem auto 0;--c:var(--cyan)"></div>
      <div class="totals-row" id="totals-row"></div>

      <div id="sections"></div>

      <div id="practice-sections"></div>

      <div id="history-section" class="history-section" style="display:none"></div>
      <div id="buzzer-section" class="buzzer-section" style="display:none"></div>
      <div id="review-queue-section" class="rq-section"></div>

      <div class="reset-row">
        <button class="reset-btn" onclick="confirmReset()">RESET FLASHCARD PROGRESS</button>
        <button class="reset-btn" onclick="confirmResetPractice()">RESET PRACTICE STATS</button>
      </div>

      <footer>SCIENCE BOWL COMMAND NETWORK &nbsp;·&nbsp; STUDY HARD. KNOW MORE. WIN.</footer>
    </div>

    <script src="Flashcards.js"></script>
    <script>
      var SUBJECTS = ['Biology', 'Chemistry', 'Physics', 'Earth Science', 'Energy', 'Math'];
      var COLORS = {
        Biology:       'var(--green)',
        Chemistry:     'var(--cyan)',
        Physics:       'var(--magenta)',
        'Earth Science': 'var(--yellow, #f5c542)',
        Energy:        'var(--orange, #f5a623)',
        Math:          'var(--blue, #5b9cf6)'
      };

      function loadKnown(level) {
        try { return JSON.parse(localStorage.getItem('sb_known_' + level) || '{}'); } catch(e) { return {}; }
      }

      function countKnown(level, subject) {
        var known = loadKnown(level);
        var cards = FLASHCARDS[level].filter(function(c) { return c.subject === subject; });
        var count = 0;
        cards.forEach(function(c) { if (known[c.term]) count++; });
        return { known: count, total: cards.length };
      }

      function countKnownAll(level) {
        var known = loadKnown(level);
        var total = FLASHCARDS[level].length;
        var count = 0;
        FLASHCARDS[level].forEach(function(c) { if (known[c.term]) count++; });
        return { known: count, total: total };
      }

      function pct(n, d) { return d ? Math.round(n / d * 100) : 0; }

      function render() {
        var hsAll = countKnownAll('HS');
        var msAll = countKnownAll('MS');
        var grandKnown = hsAll.known + msAll.known;
        var grandTotal = hsAll.total + msAll.total;

        // Totals row
        var totalsHTML =
          '<div class="total-card" style="--c:var(--magenta)">' +
            '<div class="total-label">HIGH SCHOOL</div>' +
            '<div class="total-num">' + hsAll.known + '<span class="total-denom"> / ' + hsAll.total + '</span></div>' +
            '<div class="total-pct">' + pct(hsAll.known, hsAll.total) + '% MASTERED</div>' +
          '</div>' +
          '<div class="total-card" style="--c:var(--cyan)">' +
            '<div class="total-label">MIDDLE SCHOOL</div>' +
            '<div class="total-num">' + msAll.known + '<span class="total-denom"> / ' + msAll.total + '</span></div>' +
            '<div class="total-pct">' + pct(msAll.known, msAll.total) + '% MASTERED</div>' +
          '</div>';
        document.getElementById('totals-row').innerHTML = totalsHTML;

        // Level sections
        var sectionsHTML = '';
        [['HS', 'var(--magenta)', 'HIGH SCHOOL'], ['MS', 'var(--cyan)', 'MIDDLE SCHOOL']].forEach(function(lv) {
          var level = lv[0], color = lv[1], label = lv[2];
          var all = countKnownAll(level);
          sectionsHTML += '<div class="level-section">';
          sectionsHTML += '<div class="level-header" style="--c:' + color + '">' +
            '<h2 class="level-title">' + label + '</h2>' +
            '<span class="level-total">' + all.known + ' / ' + all.total + ' KNOWN</span>' +
          '</div>';
          sectionsHTML += '<div class="subject-list">';
          SUBJECTS.forEach(function(subj) {
            var c = countKnown(level, subj);
            var subjColor = COLORS[subj] || color;
            var width = pct(c.known, c.total);
            sectionsHTML +=
              '<div class="subject-row">' +
                '<div class="subject-row-top">' +
                  '<span class="subject-name" style="color:' + subjColor + ';text-shadow:0 0 6px ' + subjColor + '">' + subj.toUpperCase() + '</span>' +
                  '<span class="subject-count">' + c.known + ' / ' + c.total + ' &nbsp;·&nbsp; ' + pct(c.known, c.total) + '%</span>' +
                '</div>' +
                '<div class="bar-track"><div class="bar-fill" style="width:' + width + '%;background:' + subjColor + ';box-shadow:0 0 6px ' + subjColor + '"></div></div>' +
              '</div>';
          });
          sectionsHTML += '</div></div>';
        });
        document.getElementById('sections').innerHTML = sectionsHTML;
      }

      var PRACTICE_SUBJECTS = ['Math', 'Physics', 'Chemistry', 'Biology', 'EarthSpace', 'Energy'];
      var PRACTICE_LABELS   = { Math: 'MATHEMATICS', Physics: 'PHYSICS', Chemistry: 'CHEMISTRY', Biology: 'BIOLOGY', EarthSpace: 'EARTH & SPACE', Energy: 'ENERGY' };
      var PRACTICE_COLORS   = { Math: 'var(--blue, #5b9cf6)', Physics: 'var(--magenta)', Chemistry: 'var(--cyan)', Biology: 'var(--green)', EarthSpace: 'var(--yellow, #f5c542)', Energy: 'var(--orange, #f5a623)' };

      function loadPracticeStats(level) {
        try { return JSON.parse(localStorage.getItem('sb_practice_' + level) || 'null'); } catch(e) { return null; }
      }

      function renderPractice() {
        var html = '';
        var hasPractice = false;

        [['HS', 'HIGH SCHOOL'], ['MS', 'MIDDLE SCHOOL']].forEach(function(lv) {
          var level = lv[0], label = lv[1];
          var data = loadPracticeStats(level);
          if (!data || !data._total) return;
          hasPractice = true;

          var overallPct = data._total ? Math.round(data._correct / data._total * 100) : 0;
          var scoreColor = overallPct >= 70 ? 'var(--green)' : overallPct >= 40 ? 'var(--orange, #f5a623)' : 'var(--magenta)';

          html += '<div class="practice-section">';
          html += '<div class="practice-header">' +
            '<h2 class="practice-title">PRACTICE — ' + label + '</h2>' +
            '<span class="practice-meta">' + (data._sessions || 0) + ' SESSION' + (data._sessions !== 1 ? 'S' : '') + ' &nbsp;·&nbsp; BEST CHAIN: ' + (data._bestStreak || 0) + '</span>' +
          '</div>';

          html += '<div class="practice-totals">' +
            '<div class="total-card" style="--c:' + scoreColor + '">' +
              '<div class="total-label">OVERALL ACCURACY</div>' +
              '<div class="total-num" style="color:' + scoreColor + ';text-shadow:0 0 14px ' + scoreColor + '">' + overallPct + '<span class="total-denom">%</span></div>' +
              '<div class="total-pct">' + data._correct + ' / ' + data._total + ' CORRECT</div>' +
            '</div>' +
            '<div class="total-card" style="--c:var(--orange,#f5a623)">' +
              '<div class="total-label">SESSIONS COMPLETED</div>' +
              '<div class="total-num" style="color:var(--orange,#f5a623);text-shadow:0 0 14px var(--orange,#f5a623)">' + (data._sessions || 0) + '</div>' +
              '<div class="total-pct">BEST STREAK: ' + (data._bestStreak || 0) + '</div>' +
            '</div>' +
          '</div>';

          html += '<div class="practice-list">';
          PRACTICE_SUBJECTS.forEach(function(subj) {
            if (!data[subj] || !data[subj].total) return;
            var c = data[subj].correct, t = data[subj].total;
            var p = Math.round(c / t * 100);
            var color = PRACTICE_COLORS[subj];
            var barColor = p >= 70 ? 'var(--green)' : p >= 40 ? 'var(--orange,#f5a623)' : 'var(--magenta)';
            html +=
              '<div class="subject-row">' +
                '<div class="subject-row-top">' +
                  '<span class="subject-name" style="color:' + color + ';text-shadow:0 0 6px ' + color + '">' + PRACTICE_LABELS[subj] + '</span>' +
                  '<span class="subject-count">' + c + ' / ' + t + ' &nbsp;·&nbsp; ' + p + '%</span>' +
                '</div>' +
                '<div class="bar-track"><div class="bar-fill" style="width:' + p + '%;background:' + barColor + ';box-shadow:0 0 6px ' + barColor + '"></div></div>' +
              '</div>';
          });
          html += '</div></div>';
        });

        if (!hasPractice) {
          html = '<div class="practice-section"><div class="practice-header"><h2 class="practice-title">PRACTICE STATS</h2></div>' +
            '<p style="color:var(--muted);font-size:0.72rem;letter-spacing:0.15em;text-align:center;padding:1.5rem 0">No practice sessions recorded yet. Complete a session on the Practice page to see stats here.</p></div>';
        }
        document.getElementById('practice-sections').innerHTML = html;
      }

      function confirmReset() {
        if (confirm('Reset ALL flashcard progress for both HS and MS? This cannot be undone.')) {
          localStorage.removeItem('sb_known_HS');
          localStorage.removeItem('sb_known_MS');
          render();
        }
      }

      function confirmResetPractice() {
        if (confirm('Reset ALL practice stats for both HS and MS? This cannot be undone.')) {
          localStorage.removeItem('sb_practice_HS');
          localStorage.removeItem('sb_practice_MS');
          renderPractice();
        }
      }

      function findWeakSpot() {
        var MIN_Q = 8, worst = null;
        [['HS', 'HIGH SCHOOL'], ['MS', 'MIDDLE SCHOOL']].forEach(function(lv) {
          var data = loadPracticeStats(lv[0]);
          if (!data) return;
          PRACTICE_SUBJECTS.forEach(function(subj) {
            if (!data[subj] || data[subj].total < MIN_Q) return;
            var p = Math.round(data[subj].correct / data[subj].total * 100);
            if (!worst || p < worst.pct) worst = { subj: subj, level: lv[0], label: lv[1], pct: p, correct: data[subj].correct, total: data[subj].total };
          });
        });
        return worst;
      }

      function renderWeakSpot() {
        var el = document.getElementById('weak-spot');
        var ws = findWeakSpot();
        if (!ws) { el.style.display = 'none'; return; }
        var color = ws.pct >= 70 ? 'var(--green)' : ws.pct >= 40 ? 'var(--orange,#f5a623)' : 'var(--magenta)';
        el.style.display = 'block';
        el.innerHTML =
          '<div class="ws-label">⚠ WEAK SPOT DETECTED</div>' +
          '<div class="ws-subject" style="color:' + color + ';text-shadow:0 0 10px ' + color + '">' + PRACTICE_LABELS[ws.subj] + ' &nbsp;—&nbsp; ' + ws.label + '</div>' +
          '<div class="ws-stats">' + ws.correct + ' / ' + ws.total + ' correct &nbsp;·&nbsp; ' + ws.pct + '% accuracy</div>' +
          '<a href="Practice.html?level=' + ws.level + '&subject=' + ws.subj + '" class="ws-drill-btn">DRILL THIS SUBJECT →</a>';
      }

      function renderSessionHistory() {
        var history = [];
        try { history = JSON.parse(localStorage.getItem('sb_session_history') || '[]'); } catch(e) {}
        var el = document.getElementById('history-section');
        if (!history.length) { el.style.display = 'none'; return; }
        el.style.display = 'block';
        var recent = history.slice(-10);
        var barsHTML = recent.map(function(s) {
          var color = s.pct >= 70 ? 'var(--green)' : s.pct >= 40 ? 'var(--orange,#f5a623)' : 'var(--magenta)';
          var badge = s.survival ? '<div class="h-bar-badge" style="background:var(--magenta)33;color:var(--magenta)">♥</div>' : '';
          var lvBadge = s.level ? '<div class="h-bar-badge" style="background:' + (s.level==='HS'?'var(--magenta)':'var(--cyan)') + '33;color:' + (s.level==='HS'?'var(--magenta)':'var(--cyan)') + '">' + s.level + '</div>' : '';
          return '<div class="h-bar-col">' +
            badge + lvBadge +
            '<span class="h-bar-pct" style="color:' + color + ';text-shadow:0 0 6px ' + color + '">' + s.pct + '%</span>' +
            '<div class="h-bar-track"><div class="h-bar-fill" style="height:' + s.pct + '%;background:' + color + ';box-shadow:0 0 6px ' + color + '33"></div></div>' +
            '<span class="h-bar-date">' + s.date + '</span>' +
          '</div>';
        }).join('');
        el.innerHTML = '<div class="history-header"><h2 class="history-title">SESSION HISTORY</h2><span style="font-size:0.68rem;letter-spacing:0.18em;color:var(--muted)">LAST ' + recent.length + ' SESSIONS</span></div>' +
          '<div class="history-bars">' + barsHTML + '</div>';
      }

      function renderBuzzerStats() {
        var s = null;
        try { s = JSON.parse(localStorage.getItem('sb_buzzer_stats') || 'null'); } catch(e) {}
        var el = document.getElementById('buzzer-section');
        if (!s || !s.sessions) { el.style.display = 'none'; return; }
        el.style.display = 'block';
        var acc = s.buzzed ? Math.round(s.correct / s.buzzed * 100) : 0;
        var wl = s.sessions > s.draws ? Math.round((s.wins / (s.sessions - s.draws)) * 100) : 0;
        var cards = [
          { num: s.sessions, label: 'MATCHES', color: 'var(--cyan)' },
          { num: s.wins,     label: 'WINS',    color: 'var(--green)' },
          { num: s.losses,   label: 'LOSSES',  color: 'var(--magenta)' },
          { num: s.draws,    label: 'DRAWS',   color: 'var(--muted)' },
          { num: acc + '%',  label: 'BUZZ ACC', color: acc >= 70 ? 'var(--green)' : acc >= 40 ? 'var(--orange,#f5a623)' : 'var(--magenta)' },
          { num: wl + '%',   label: 'WIN RATE', color: wl >= 60 ? 'var(--green)' : wl >= 40 ? 'var(--orange,#f5a623)' : 'var(--magenta)' },
        ].map(function(c) {
          return '<div class="bz-card"><div class="bz-card-num" style="color:' + c.color + ';text-shadow:0 0 12px ' + c.color + '">' + c.num + '</div><div class="bz-card-label">' + c.label + '</div></div>';
        }).join('');
        var history = s.history || [];
        var pips = history.slice(-20).map(function(h) {
          var c = h.won === 1 ? 'var(--green)' : h.won === 0.5 ? 'var(--cyan)' : 'var(--magenta)';
          return '<div class="bz-pip" style="background:' + c + ';box-shadow:0 0 4px ' + c + '" title="' + h.date + ' ' + h.myScore + '-' + h.enScore + '"></div>';
        }).join('');
        el.innerHTML = '<div class="buzzer-header"><h2 class="buzzer-title">BUZZER ARENA RECORD</h2></div>' +
          '<div class="buzzer-grid">' + cards + '</div>' +
          (pips ? '<div style="font-size:0.6rem;letter-spacing:0.2em;color:var(--muted);margin-bottom:0.5rem">RECENT MATCHES</div><div class="bz-history">' + pips + '</div>' : '');
      }

      function renderStreak() {
        var el = document.getElementById('streak-card');
        if (!el) return;
        var s = null; try { s = JSON.parse(localStorage.getItem('sb_streak') || 'null'); } catch(e) {}
        if (!s || !s.count) { el.style.display = 'none'; return; }
        el.style.display = 'block';
        var today = new Date().toISOString().slice(0, 10);
        var active = s.lastDate === today;
        var color = active ? 'var(--cyan)' : 'var(--orange,#f5a623)';
        var note = active ? 'TRAINED TODAY ✓' : 'PRACTICE TODAY TO KEEP YOUR STREAK';
        el.innerHTML =
          '<div class="total-label">TRAINING STREAK</div>' +
          '<div class="total-num" style="color:' + color + ';text-shadow:0 0 20px ' + color + '">' + s.count + '<span class="total-denom"> DAYS</span></div>' +
          '<div class="total-pct" style="color:' + color + '">' + note + '</div>' +
          (s.best > 1 ? '<div class="total-pct" style="opacity:0.6">BEST: ' + s.best + ' DAYS</div>' : '');
      }

      var RQ_SUBJECT_COLORS = {
        Biology: 'var(--green)', Chemistry: 'var(--cyan)', Physics: 'var(--magenta)',
        EarthSpace: 'var(--yellow,#f5c542)', Energy: 'var(--orange,#f5a623)', Math: 'var(--blue,#5b9cf6)'
      };
      var RQ_SUBJECT_LABELS = {
        Biology: 'BIO', Chemistry: 'CHEM', Physics: 'PHYS',
        EarthSpace: 'EARTH', Energy: 'ENERGY', Math: 'MATH'
      };

      function loadRQ() {
        try { return JSON.parse(localStorage.getItem('sb_review_queue') || '[]'); } catch(e) { return []; }
      }
      function saveRQ(q) { localStorage.setItem('sb_review_queue', JSON.stringify(q)); }

      function removeRQItem(idx) {
        var q = loadRQ();
        q.splice(idx, 1);
        saveRQ(q);
        renderRQ();
      }

      function renderRQ() {
        var el = document.getElementById('review-queue-section');
        if (!el) return;
        var q = loadRQ();
        var html = '<div class="rq-header"><h2 class="rq-title">REVIEW QUEUE</h2>' +
          '<span class="rq-count">' + q.length + ' QUESTION' + (q.length !== 1 ? 'S' : '') + '</span></div>';
        if (q.length === 0) {
          html += '<p class="rq-empty">Review queue is empty — missed questions are added here after practice.</p>';
        } else {
          html += '<div class="rq-list">';
          q.forEach(function(item, i) {
            var color = RQ_SUBJECT_COLORS[item.subjectName] || 'var(--muted)';
            var label = RQ_SUBJECT_LABELS[item.subjectName] || item.subjectName;
            var raw = item.question || '';
            var wIdx = raw.indexOf('W) ');
            var display = (wIdx > 0 ? raw.slice(0, wIdx).trim() : raw);
            if (display.length > 90) display = display.slice(0, 90) + '…';
            html +=
              '<div class="rq-item">' +
                '<span class="rq-subject" style="color:' + color + ';border:1px solid ' + color + '55;text-shadow:0 0 6px ' + color + '">' + label + '</span>' +
                '<span class="rq-question">' + display + '</span>' +
                '<button class="rq-remove" onclick="removeRQItem(' + i + ')">✕</button>' +
              '</div>';
          });
          html += '</div>';
          html += '<a href="Practice.html" class="rq-drill-btn">DRILL ALL →</a>';
        }
        el.innerHTML = html;
      }

      render();
      renderPractice();
      renderWeakSpot();
      renderSessionHistory();
      renderBuzzerStats();
      renderStreak();
      renderRQ();

      // Starfield
      (function() {
        var canvas = document.getElementById('starfield'), ctx = canvas.getContext('2d'), stars = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        function init() { stars = Array.from({length:200}, function() { return { x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*1.2+0.2, speed:Math.random()*0.25+0.04, opacity:Math.random()*0.6+0.2 }; }); }
        function draw() {
          ctx.clearRect(0,0,canvas.width,canvas.height);
          stars.forEach(function(s) { ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle='rgba(232,244,255,'+s.opacity+')'; ctx.fill(); s.y+=s.speed; if(s.y>canvas.height){s.y=0;s.x=Math.random()*canvas.width;} });
          requestAnimationFrame(draw);
        }
        window.addEventListener('resize', function(){resize();init();}); resize(); init(); draw();
      })();
    </script>
    <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
  </body>
</html>
