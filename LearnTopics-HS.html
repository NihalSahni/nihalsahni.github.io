    <style>
      .page-wrap { max-width: 1040px; margin: 0 auto; }
      .page-header { padding: 2rem 0 1rem; text-align: center; }
      .back-link { display: inline-block; font-size: 0.78rem; letter-spacing: 0.22em; color: var(--magenta); text-shadow: 0 0 6px var(--magenta)99; text-decoration: none; margin-bottom: 1rem; border: 1px solid var(--magenta)55; padding: 0.3rem 0.8rem; border-radius: 2px; transition: all 0.2s; }
      .back-link:hover { color: var(--magenta); text-shadow: 0 0 12px var(--magenta); border-color: var(--magenta); background: var(--magenta)11; }
      .page-title { font-size: clamp(1.8rem, 5vw, 3rem); color: var(--magenta); text-shadow: 0 0 30px var(--magenta), 0 0 60px var(--magenta)44; margin: 0.25rem 0; }
      .page-sub { font-size: 0.68rem; letter-spacing: 0.3em; color: var(--muted); margin-top: 0.4rem; }

      /* ── MODE TABS ──────────────────────────────── */
      .mode-tabs { display: flex; max-width: 720px; margin: 1.75rem auto 0; border: 1px solid var(--muted)44; border-radius: 4px; overflow: hidden; }
      .mode-tab { flex: 1; background: transparent; border: none; border-right: 1px solid var(--muted)44; border-radius: 0; padding: 0.8rem 0.5rem; font-size: 0.72rem; letter-spacing: 0.12em; color: var(--muted); text-shadow: none; box-shadow: none; cursor: pointer; transition: background 0.2s, color 0.2s; }
      .mode-tab:last-child { border-right: none; }
      .mode-tab:hover { background: var(--surface); color: var(--text); box-shadow: none; }
      .mode-tab.active { background: var(--magenta)18; color: var(--magenta); text-shadow: 0 0 8px var(--magenta); box-shadow: inset 0 -2px 0 var(--magenta); }

      /* ── SUBJECT FILTER PILLS ───────────────────── */
      .filter-bar { display: flex; flex-wrap: wrap; gap: 0.4rem; justify-content: center; margin: 1.5rem 0 1rem; }
      .filter-pill { background: transparent; border: 1px solid var(--muted)55; border-radius: 2px; padding: 0.3rem 0.75rem; font-size: 0.62rem; letter-spacing: 0.18em; color: var(--muted); text-shadow: none; box-shadow: none; cursor: pointer; transition: border-color 0.2s, color 0.2s, background 0.2s; }
      .filter-pill:hover { border-color: var(--text); color: var(--text); background: transparent; box-shadow: none; }
      .filter-pill.active { border-color: var(--magenta); color: var(--magenta); text-shadow: 0 0 6px var(--magenta); background: var(--magenta)11; box-shadow: none; }

      /* ── MODE PANELS ────────────────────────────── */
      .mode-panel { display: none; }
      .mode-panel.active { display: block; }

      /* ══════════════════════════════════════════════
         MODE A — SUBJECT TILES
      ══════════════════════════════════════════════ */
      #a-detail { display: none; }
      .subject-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(270px, 1fr)); gap: 1.4rem; margin-top: 0.5rem; }

      .subject-tile { position: relative; background: var(--surface); border: 1px solid var(--muted)44; border-radius: 4px; padding: 2rem 1.5rem 1.5rem; cursor: pointer; display: flex; flex-direction: column; gap: 0.6rem; transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s; }
      .subject-tile::before { content: ''; position: absolute; top: -2px; left: -2px; width: 16px; height: 16px; border-top: 3px solid var(--c, var(--magenta)); border-left: 3px solid var(--c, var(--magenta)); transition: width 0.2s, height 0.2s; }
      .subject-tile::after  { content: ''; position: absolute; bottom: -2px; right: -2px; width: 16px; height: 16px; border-bottom: 3px solid var(--c, var(--magenta)); border-right: 3px solid var(--c, var(--magenta)); transition: width 0.2s, height 0.2s; }
      .subject-tile:hover { border-color: var(--c, var(--magenta))66; box-shadow: 0 0 24px var(--c, var(--magenta))33; transform: translateY(-3px); }
      .subject-tile:hover::before, .subject-tile:hover::after { width: 26px; height: 26px; }

      .tile-icon  { font-size: 2rem; line-height: 1; }
      .tile-label { font-size: 0.6rem; letter-spacing: 0.25em; }
      .tile-name  { font-size: 1.3rem; margin: 0; text-shadow: none; line-height: 1.2; }
      .tile-enter { font-size: 0.72rem; letter-spacing: 0.18em; margin-top: 0.5rem; }

      /* ── Subject detail view ──────────────────── */
      .a-back-btn { background: transparent; border: none; padding: 0; font-size: 0.72rem; letter-spacing: 0.2em; color: var(--muted); cursor: pointer; text-shadow: none; box-shadow: none; margin-bottom: 1.75rem; display: inline-flex; align-items: center; gap: 0.5rem; transition: color 0.2s; }
      .a-back-btn:hover { color: var(--magenta); text-shadow: 0 0 8px var(--magenta); background: transparent; box-shadow: none; }

      .a-subject-header { display: flex; align-items: center; gap: 1.1rem; padding-bottom: 1.25rem; margin-bottom: 1.75rem; border-bottom: 1px solid var(--muted)33; }
      .a-subject-icon { font-size: 2.5rem; }
      .a-subject-name { font-size: clamp(1.6rem, 4vw, 2.5rem); margin: 0; text-shadow: none; }

      .a-concepts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 0.7rem; }

      .a-concept-card { background: var(--surface); border: 1px solid var(--muted)33; border-radius: 4px; overflow: hidden; transition: border-color 0.15s; }
      .a-concept-card.open { border-color: var(--muted)66; }
      .a-concept-term-row { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; padding: 0.7rem 1rem; cursor: pointer; transition: background 0.15s; user-select: none; }
      .a-concept-term-row:hover { background: rgba(255,255,255,0.03); }
      .a-concept-term-text { font-size: 0.85rem; letter-spacing: 0.08em; flex: 1; }
      .a-concept-arrow { font-size: 0.62rem; color: var(--muted); flex-shrink: 0; transition: transform 0.2s; }
      .a-concept-card.open .a-concept-arrow { transform: rotate(90deg); }
      .a-concept-def { display: none; padding: 0.4rem 1rem 0.8rem; font-size: 0.78rem; color: var(--muted); line-height: 1.72; border-top: 1px solid var(--muted)18; }
      .a-concept-card.open .a-concept-def { display: block; }

      /* ══════════════════════════════════════════════
         MODE C
      ══════════════════════════════════════════════ */
      .fc-top-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.75rem; max-width: 560px; margin-left: auto; margin-right: auto; }
      .fc-progress-text { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.12em; }
      .fc-shuffle-btn { padding: 0.3rem 0.85rem; font-size: 0.68rem; letter-spacing: 0.12em; border-color: var(--muted); color: var(--muted); text-shadow: none; box-shadow: none; }
      .fc-shuffle-btn:hover { border-color: var(--text); color: var(--text); background: transparent; box-shadow: none; }
      .fc-progress-bar-wrap { max-width: 560px; margin: 0 auto 1.5rem; height: 3px; background: var(--muted)22; border-radius: 2px; overflow: hidden; }
      .fc-progress-bar-fill { height: 100%; background: var(--magenta); box-shadow: 0 0 6px var(--magenta); transition: width 0.3s ease, background 0.3s; }

      .fc-card-wrap { perspective: 1000px; width: 100%; max-width: 560px; height: 300px; margin: 0 auto; cursor: pointer; }
      .fc-card-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.45s ease; }
      .fc-card-inner.flipped { transform: rotateY(180deg); }
      .fc-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; background: var(--surface); border: 1px solid var(--muted)44; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
      .fc-face-back { transform: rotateY(180deg); }
      .fc-subject-badge { font-size: 0.58rem; letter-spacing: 0.22em; padding: 0.2rem 0.6rem; border: 1px solid currentColor; margin-bottom: 0.6rem; }
      .fc-term { font-size: 1.55rem; letter-spacing: 0.1em; margin: 0 0 1rem; text-shadow: none; }
      .fc-flip-hint { font-size: 0.6rem; letter-spacing: 0.18em; color: var(--muted); margin-top: auto; }
      .fc-definition { font-size: 0.83rem; color: var(--text); line-height: 1.72; max-width: 480px; }
      .fc-known-btn { margin-top: 1.2rem; padding: 0.6rem 1.8rem; font-size: 0.78rem; letter-spacing: 0.2em; border: 2px solid var(--muted)88; color: var(--muted); background: transparent; cursor: pointer; border-radius: 3px; font-family: 'Share Tech Mono', monospace; transition: all 0.2s; }
      .fc-known-btn:hover { border-color: var(--green); color: var(--green); background: var(--green)11; box-shadow: 0 0 12px var(--green)44; }
      .fc-known-btn.known { border-color: var(--green); color: var(--green); background: var(--green)18; text-shadow: 0 0 8px var(--green); box-shadow: 0 0 16px var(--green)55; }

      .fc-nav { display: flex; justify-content: center; align-items: center; gap: 1.5rem; margin-top: 1.5rem; }
      .fc-nav button { padding: 0.5rem 1.6rem; font-size: 0.72rem; letter-spacing: 0.15em; }
      .fc-key-hint { text-align: center; font-size: 0.6rem; letter-spacing: 0.12em; color: var(--muted); margin-top: 0.75rem; }

      .search-wrap { max-width: 560px; margin: 0.5rem auto 0; }
      .search-input { width: 100%; background: var(--surface); border: 1px solid var(--muted)44; border-radius: 4px; padding: 0.55rem 1rem; font-family: 'Share Tech Mono', monospace; font-size: 0.78rem; letter-spacing: 0.14em; color: var(--text); outline: none; transition: border-color 0.2s; box-sizing: border-box; }
      .search-input::placeholder { color: var(--muted); }
      .search-input:focus { border-color: var(--magenta); box-shadow: 0 0 8px var(--magenta)44; }
      .search-count { font-size: 0.62rem; letter-spacing: 0.2em; color: var(--muted); margin-bottom: 1rem; }

      footer { text-align: center; font-size: 0.62rem; letter-spacing: 0.15em; color: var(--muted)88; padding: 3rem 0 2rem; }

      @media (max-width: 600px) {
        .fc-card-wrap { height: 240px; }
        .fc-term { font-size: 1.2rem; }
        .fc-definition { font-size: 0.75rem; }
        .fc-known-btn { padding: 0.5rem 1.2rem; font-size: 0.7rem; }
        .fc-flip-hint { font-size: 0.55rem; }

        .fc-top-row { flex-direction: column; align-items: flex-start; gap: 0.4rem; }

        .mode-tab { font-size: 0.62rem; padding: 0.7rem 0.3rem; letter-spacing: 0.08em; }

        .filter-pill { padding: 0.25rem 0.5rem; font-size: 0.58rem; letter-spacing: 0.1em; }

        .fc-nav button { padding: 0.5rem 1rem; font-size: 0.65rem; }
        .fc-nav { gap: 1rem; }

        .back-link { font-size: 0.68rem; padding: 0.25rem 0.6rem; }
        .page-header { padding: 1.5rem 0 0.75rem; }
      }

  <body>
    <canvas id="starfield"></canvas>
    <div id="scanlines"></div>

    <div class="page-wrap">
      <div class="page-header">
        <a href="LearnTopics.html" class="back-link">← SELECT DIVISION</a>
        <a href="Progress.html" class="back-link" style="margin-left:1.5rem">VIEW PROGRESS →</a>
        <h1 class="page-title">HS INTEL DATABASE</h1>
        <p class="page-sub">MODULE 03B — HIGH SCHOOL CONCEPT REFERENCE &amp; STUDY TOOLS</p>
      </div>

      <!-- Mode tabs -->
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="A" onclick="switchMode('A')">TOPIC CARDS</button>
        <button class="mode-tab" data-mode="C" onclick="switchMode('C')">FLASHCARDS</button>
      </div>

      <!-- Search bar (Mode A only) -->
      <div class="search-wrap" id="search-wrap">
        <input class="search-input" id="search-input" type="text" placeholder="SEARCH TOPICS..." oninput="doSearch(this.value)" autocomplete="off" />
      </div>

      <!-- Subject filter pills -->
      <div class="filter-bar">
        <button class="filter-pill active" data-subj="ALL"            onclick="setSubject('ALL')">ALL</button>
        <button class="filter-pill"         data-subj="Biology"        onclick="setSubject('Biology')">BIOLOGY</button>
        <button class="filter-pill"         data-subj="Chemistry"      onclick="setSubject('Chemistry')">CHEMISTRY</button>
        <button class="filter-pill"         data-subj="Physics"        onclick="setSubject('Physics')">PHYSICS</button>
        <button class="filter-pill"         data-subj="Earth Science"  onclick="setSubject('Earth Science')">EARTH SCIENCE</button>
        <button class="filter-pill"         data-subj="Energy"         onclick="setSubject('Energy')">ENERGY</button>
        <button class="filter-pill"         data-subj="Math"           onclick="setSubject('Math')">MATH</button>
      </div>

      <!-- MODE A -->
      <div id="panel-A" class="mode-panel active">
        <div id="search-results" style="display:none"></div>
        <div id="a-overview">
          <div class="subject-grid" id="mode-a-grid"></div>
        </div>
        <div id="a-detail">
          <button class="a-back-btn" onclick="closeSubject()">← ALL SUBJECTS</button>
          <div class="a-subject-header" id="a-subject-header"></div>
          <div id="a-concepts-grid"></div>
        </div>
      </div>

      <!-- MODE C -->
      <div id="panel-C" class="mode-panel">
        <div class="fc-top-row">
          <span class="fc-progress-text" id="fc-progress">Card 1 of —</span>
          <div style="display:flex;gap:0.5rem">
            <button class="fc-shuffle-btn" id="fc-mode-btn" onclick="toggleDefFirst()">DEF → TERM</button>
            <button class="fc-shuffle-btn" onclick="shuffleDeck()">⟳ SHUFFLE</button>
          </div>
        </div>
        <div class="fc-progress-bar-wrap">
          <div class="fc-progress-bar-fill" id="fc-bar"></div>
        </div>
        <div class="fc-card-wrap" onclick="flipCard()">
          <div class="fc-card-inner" id="fc-inner">
            <div class="fc-face fc-face-front">
              <span class="fc-subject-badge" id="fc-badge">BIOLOGY</span>
              <h2 class="fc-term" id="fc-term">—</h2>
              <span class="fc-flip-hint">CLICK CARD TO FLIP</span>
            </div>
            <div class="fc-face fc-face-back">
              <p class="fc-definition" id="fc-def"></p>
              <button class="fc-known-btn" id="fc-known-btn" onclick="toggleKnown(event)">MARK AS KNOWN</button>
            </div>
          </div>
        </div>
        <div class="fc-nav">
          <button onclick="prevCard()">← PREV</button>
          <button onclick="nextCard()">NEXT →</button>
        </div>
        <p class="fc-key-hint">[ ← → ] NAVIGATE &nbsp;·&nbsp; [ SPACE ] FLIP</p>
      </div>

      <footer>SCIENCE BOWL COMMAND NETWORK &nbsp;·&nbsp; STUDY HARD. KNOW MORE. WIN.</footer>
    </div>

    <script src="question.js"></script>
    <script src="Learn.js"></script>
    <script src="Flashcards.js"></script>
    <script>
      var currentMode    = 'A';
      var currentSubject = 'ALL';
      var currentLevel   = 'HS';
      var fcDeck = [], fcIndex = 0, fcFlipped = false, defFirst = false;
      var searchQuery    = '';
      var knownCards     = {};

      function loadKnown() {
        try { knownCards = JSON.parse(localStorage.getItem('sb_known_HS') || '{}'); } catch(e) { knownCards = {}; }
      }
      function saveKnown() {
        try { localStorage.setItem('sb_known_HS', JSON.stringify(knownCards)); } catch(e) {}
      }
      function toggleKnown(e) {
        e.stopPropagation();
        var key = fcDeck[fcIndex].concept.term;
        if (knownCards[key]) { delete knownCards[key]; } else { knownCards[key] = true; }
        saveKnown();
        updateKnownBtn();
      }
      function toggleDefFirst() {
        defFirst = !defFirst;
        var btn = document.getElementById('fc-mode-btn');
        btn.textContent = defFirst ? 'TERM → DEF' : 'DEF → TERM';
        btn.style.color = defFirst ? 'var(--magenta)' : '';
        btn.style.borderColor = defFirst ? 'var(--magenta)' : '';
        fcFlipped = false;
        document.getElementById('fc-inner').classList.remove('flipped');
        renderCard();
      }

      function updateKnownBtn() {
        var key = fcDeck[fcIndex] ? fcDeck[fcIndex].concept.term : '';
        var btn = document.getElementById('fc-known-btn');
        var isKnown = !!knownCards[key];
        btn.textContent = isKnown ? '✓ KNOWN' : 'MARK AS KNOWN';
        btn.classList.toggle('known', isKnown);
      }

      function getSubjects() {
        return currentSubject === 'ALL' ? Object.keys(CONCEPTS) : [currentSubject];
      }

      function getItems(subject) {
        return CONCEPTS[subject].items.filter(function(c) { return !c.level || c.level === 'HS'; });
      }

      // ── Mode switching ─────────────────────────────
      function switchMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-tab').forEach(function(t) {
          t.classList.toggle('active', t.dataset.mode === mode);
        });
        document.querySelectorAll('.mode-panel').forEach(function(p) { p.classList.remove('active'); });
        document.getElementById('panel-' + mode).classList.add('active');
        var sw = document.getElementById('search-wrap');
        if (mode === 'A') {
          sw.style.display = '';
        } else {
          sw.style.display = 'none';
          document.getElementById('search-input').value = '';
          searchQuery = '';
          document.getElementById('search-results').style.display = 'none';
        }
        if (mode === 'C') buildFCDeck();
      }

      // ── Subject filter ─────────────────────────────
      function setSubject(subj) {
        currentSubject = subj;
        document.querySelectorAll('.filter-pill').forEach(function(p) {
          p.classList.toggle('active', p.dataset.subj === subj);
        });
        if (currentMode === 'A') {
          document.getElementById('search-input').value = '';
          searchQuery = '';
          document.getElementById('search-results').style.display = 'none';
          closeSubject(); renderModeAOverview();
        }
        if (currentMode === 'C') buildFCDeck();
      }

      // ── Search ─────────────────────────────────────
      function doSearch(q) {
        searchQuery = q.trim().toLowerCase();
        if (!searchQuery) {
          document.getElementById('search-results').style.display = 'none';
          document.getElementById('a-overview').style.display = '';
          return;
        }
        closeSubject();
        document.getElementById('a-overview').style.display = 'none';

        var results = [];
        Object.keys(CONCEPTS).forEach(function(subject) {
          getItems(subject).forEach(function(concept) {
            var hay = concept.term.toLowerCase() + ' ' + concept.def.toLowerCase();
            if (concept.keywords) hay += ' ' + concept.keywords.join(' ').toLowerCase();
            if (hay.indexOf(searchQuery) !== -1) results.push({ subject: subject, concept: concept, color: CONCEPTS[subject].color });
          });
        });

        var wrap = document.getElementById('search-results');
        wrap.style.display = 'block';
        if (!results.length) {
          wrap.innerHTML = '<p style="text-align:center;color:var(--muted);font-size:0.78rem;letter-spacing:0.15em;padding:2rem 0">NO MATCHES FOUND</p>';
          return;
        }
        var html = '<p class="search-count">' + results.length + ' RESULT' + (results.length !== 1 ? 'S' : '') + '</p><div class="a-concepts-grid">';
        results.forEach(function(r, i) {
          var uid = 'sr' + i;
          html += '<div class="a-concept-card" id="acd-' + uid + '">' +
            '<div class="a-concept-term-row" onclick="toggleACard(\'acd-' + uid + '\')">' +
              '<span class="a-concept-term-text" style="color:' + r.color + '">' + r.concept.term.toUpperCase() + '</span>' +
              '<span style="font-size:0.58rem;letter-spacing:0.16em;color:' + r.color + ';opacity:0.75;flex-shrink:0">' + r.subject.toUpperCase() + '</span>' +
              '<span class="a-concept-arrow">▶</span>' +
            '</div>' +
            '<div class="a-concept-def">' + r.concept.def + '</div>' +
          '</div>';
        });
        html += '</div>';
        wrap.innerHTML = html;
      }

      // ══════════════════════════════════════════════
      //  MODE A
      // ══════════════════════════════════════════════
      function renderModeAOverview() {
        var grid = document.getElementById('mode-a-grid');
        grid.innerHTML = '';
        getSubjects().forEach(function(subject) {
          var data  = CONCEPTS[subject];
          var items = getItems(subject);
          if (!items.length) return;
          var tile  = document.createElement('div');
          tile.className = 'subject-tile';
          tile.style.setProperty('--c', data.color);
          tile.setAttribute('onclick', 'openSubject("' + subject.replace(/"/g, '\\"') + '")');
          tile.innerHTML =
            '<span class="tile-icon">' + data.icon + '</span>' +
            '<span class="tile-label" style="color:' + data.color + ';text-shadow:0 0 6px ' + data.color + '">— SUBJECT —</span>' +
            '<h3 class="tile-name"  style="color:' + data.color + ';text-shadow:0 0 10px ' + data.color + '">' + subject.toUpperCase() + '</h3>' +
            '<span class="tile-enter" style="color:' + data.color + ';text-shadow:0 0 6px ' + data.color + '">EXPLORE TOPICS →</span>';
          grid.appendChild(tile);
        });
      }

      function openSubject(subject) {
        var data = CONCEPTS[subject];
        if (!data) return;
        document.getElementById('a-subject-header').innerHTML =
          '<span class="a-subject-icon">' + data.icon + '</span>' +
          '<h2 class="a-subject-name" style="color:' + data.color + ';text-shadow:0 0 20px ' + data.color + '">' + subject.toUpperCase() + '</h2>';

        var wrap = document.getElementById('a-concepts-grid');
        wrap.innerHTML = '';
        var grid = document.createElement('div');
        grid.className = 'a-concepts-grid';
        getItems(subject).forEach(function(concept, i) {
          var uid  = 'hs' + i;
          var card = document.createElement('div');
          card.className = 'a-concept-card';
          card.id = 'acd-' + uid;
          card.innerHTML =
            '<div class="a-concept-term-row" onclick="toggleACard(\'acd-' + uid + '\')">' +
              '<span class="a-concept-term-text" style="color:' + data.color + '">' + concept.term.toUpperCase() + '</span>' +
              '<span class="a-concept-arrow">▶</span>' +
            '</div>' +
            '<div class="a-concept-def">' + concept.def + '</div>';
          grid.appendChild(card);
        });
        wrap.appendChild(grid);

        document.getElementById('a-overview').style.display = 'none';
        document.getElementById('a-detail').style.display   = 'block';
        document.getElementById('panel-A').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }

      function closeSubject() {
        document.getElementById('a-overview').style.display = '';
        document.getElementById('a-detail').style.display   = 'none';
      }

      function toggleACard(id) {
        document.getElementById(id).classList.toggle('open');
      }

      // ══════════════════════════════════════════════
      //  MODE C
      // ══════════════════════════════════════════════
      function buildFCDeck() {
        fcFlipped = false;
        document.getElementById('fc-inner').classList.remove('flipped');
        fcDeck = []; fcIndex = 0;
        var source = FLASHCARDS['HS'];
        if (currentSubject !== 'ALL') {
          source = source.filter(function(c) { return c.subject === currentSubject; });
        }
        source.forEach(function(card) {
          fcDeck.push({ subject: card.subject, concept: { term: card.term, def: card.def }, color: CONCEPTS[card.subject] ? CONCEPTS[card.subject].color : 'var(--magenta)' });
        });
        for (var i = fcDeck.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1)), tmp = fcDeck[i]; fcDeck[i] = fcDeck[j]; fcDeck[j] = tmp;
        }
        renderCard();
      }

      function renderCard() {
        if (!fcDeck.length) return;
        var card = fcDeck[fcIndex], color = card.color;

        var badge = document.getElementById('fc-badge');
        badge.textContent = card.subject.toUpperCase();
        badge.style.color = color; badge.style.borderColor = color; badge.style.textShadow = '0 0 8px ' + color;

        var termEl = document.getElementById('fc-term');
        var defEl  = document.getElementById('fc-def');

        if (!defFirst) {
          termEl.textContent = card.concept.term.toUpperCase();
          termEl.style.fontSize = '1.55rem'; termEl.style.color = color; termEl.style.textShadow = '0 0 14px ' + color;
          defEl.textContent = card.concept.def;
          defEl.style.fontSize = '0.83rem'; defEl.style.color = 'var(--text)';
        } else {
          termEl.textContent = card.concept.def;
          termEl.style.fontSize = '0.9rem'; termEl.style.color = 'var(--text)'; termEl.style.textShadow = 'none';
          defEl.textContent = card.concept.term.toUpperCase();
          defEl.style.fontSize = '1.4rem'; defEl.style.color = color;
        }
        document.getElementById('fc-progress').textContent = 'Card ' + (fcIndex + 1) + ' of ' + fcDeck.length;

        var bar = document.getElementById('fc-bar');
        bar.style.width = ((fcIndex + 1) / fcDeck.length * 100) + '%';
        bar.style.background = color; bar.style.boxShadow = '0 0 6px ' + color;
        updateKnownBtn();
      }

      function flipCard() {
        fcFlipped = !fcFlipped;
        document.getElementById('fc-inner').classList.toggle('flipped', fcFlipped);
      }
      function nextCard() {
        fcFlipped = false; document.getElementById('fc-inner').classList.remove('flipped');
        fcIndex = (fcIndex + 1) % fcDeck.length; renderCard();
      }
      function prevCard() {
        fcFlipped = false; document.getElementById('fc-inner').classList.remove('flipped');
        fcIndex = (fcIndex - 1 + fcDeck.length) % fcDeck.length; renderCard();
      }
      function shuffleDeck() {
        for (var i = fcDeck.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1)), tmp = fcDeck[i]; fcDeck[i] = fcDeck[j]; fcDeck[j] = tmp;
        }
        fcIndex = 0; fcFlipped = false;
        document.getElementById('fc-inner').classList.remove('flipped');
        renderCard();
      }

      document.addEventListener('keydown', function(e) {
        if (currentMode !== 'C') return;
        if (e.key === 'ArrowRight') nextCard();
        if (e.key === 'ArrowLeft')  prevCard();
        if (e.key === ' ') { e.preventDefault(); flipCard(); }
      });

      // ── Init ──────────────────────────────────────
      loadKnown();
      renderModeAOverview();
      buildFCDeck();

      // Starfield
      (function() {
        var canvas = document.getElementById('starfield'), ctx = canvas.getContext('2d'), stars = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        function init() { stars = Array.from({length:200}, function() { return { x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*1.2+0.2, speed:Math.random()*0.25+0.04, opacity:Math.random()*0.6+0.2 }; }); }
        function draw() {
          ctx.clearRect(0,0,canvas.width,canvas.height);
          stars.forEach(function(s) { ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle='rgba(232,244,255,'+s.opacity+')'; ctx.fill(); s.y+=s.speed; if(s.y>canvas.height){s.y=0;s.x=Math.random()*canvas.width;} });
          requestAnimationFrame(draw);
        }
        window.addEventListener('resize', function(){resize();init();}); resize(); init(); draw();
      })();
    </script>
    <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
  </body>
</html>
