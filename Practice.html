<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Science Bowl Practice</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1 id="Title">Trial Configuration</h1>

    <div id="ranks">
      <button id="Cadet" onclick="MSSelect()">Cadet</button>
      <button id="Lieutenant" onclick="HSSelect()">Lieutenant</button>
    </div>

    <div id="CampaignLength">
      <br />
      <h3>Campaign Length</h3>
      <h3 id="AmountQuestions">30 Questions</h3>
      <input type="range" min="10" max="100" value="30" id="QuestionSlider" onchange="UpdateQuestions()" />
    </div>

    <div id="SubjectContainer">
      <label><input id="Everything" type="checkbox" onclick="addSubject('Everything', this)" /> All Subjects</label>
      <label><input id="Biology"    type="checkbox" onclick="addSubject('Biology', this)"    /> Biology</label>
      <label><input id="Physics"    type="checkbox" onclick="addSubject('Physics', this)"    /> Physics</label>
      <label><input id="Chemistry"  type="checkbox" onclick="addSubject('Chemistry', this)"  /> Chemistry</label>
      <label><input id="EarthSpace" type="checkbox" onclick="addSubject('EarthSpace', this)" /> Earth and Space</label>
      <label><input id="Energy"     type="checkbox" onclick="addSubject('Energy', this)"     /> Energy</label>
      <label><input id="Math"       type="checkbox" onclick="addSubject('Math', this)"       /> Math</label>
    </div>

    <div id="QuestionContainer"></div>
    <h1 id="answer"></h1>
    <button onclick="AddMCQuestion()" id="Submit">Initiate trial</button>

    <script src="question.js"></script>
    <script src="Practice.js"></script>
  </body>
</html>
